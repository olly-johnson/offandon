name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vitest (engines + app) and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vitest — engines
        run: npm run test:engines -- --run --passWithNoTests

      - name: Vitest — app
        run: npm run test:app -- --run --passWithNoTests

      - name: Lint
        run: npm run lint
